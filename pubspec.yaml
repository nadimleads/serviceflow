name: serviceflow
description: "A new Flutter project."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'  # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1
  intl: ^0.20.2

dev_dependencies:
  build_runner: ^2.4.12          # Very stable & widely used (required for code generation)
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see:
# https://dart.dev/tools/pub/pubspec

flutter:
  # Ensures Material Icons font is included (for Material Icons class)
  uses-material-design: true

  # Uncomment to add assets:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # For custom fonts, add a fonts section here (example):
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic